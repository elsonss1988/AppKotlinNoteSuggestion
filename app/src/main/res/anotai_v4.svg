  <!-- Nome do app -->
  <text x="256" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">ANOTAÍ</text>
  
  <!-- Detalhes decorativos -->
