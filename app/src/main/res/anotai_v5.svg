<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FCF8E8"/>
    </linearGradient>
  </defs>
  
  <!-- Fundo -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#FFD966" stroke-width="2"/>
  
  <!-- Caderno minimalista -->
  <rect x="106" y="130" width="300" height="260" fill="url(#paperGrad)" rx="16" stroke="#E0B070" stroke-width="2"/>
  
  <!-- Linhas minimalistas -->
  <g stroke="#E8DEC0" stroke-width="1.8">
    <line x1="136" y1="190" x2="376" y2="190"/>
    <line x1="136" y1="230" x2="376" y2="230"/>
    <line x1="136" y1="270" x2="376" y2="270"/>
    <line x1="136" y1="310" x2="376" y2="310"/>
    <line x1="136" y1="350" x2="316" y2="350"/>
  </g>
  
  <!-- Margem -->
  <line x1="166" y1="150" x2="166" y2="380" stroke="#E87A7A" stroke-width="3"/>
  
  <!-- Lâmpada estilizada -->
  <g transform="translate(360, 60)">
    <circle cx="45" cy="45" r="28" fill="#FFD966" stroke="#E69500" stroke-width="1.5"/>
    <rect x="37" y="73" width="16" height="24" fill="#FFD966" rx="3"/>
    <path d="M45,32 L45,45 M32,45 L58,45" stroke="#FFE082" stroke-width="2"/>
  </g>
  
  <!-- Botão + -->
  <g transform="translate(370, 390)">
    <circle cx="55" cy="55" r="28" fill="#FFB74D"/>
    <line x1="55" y1="40" x2="55" y2="70" stroke="#FFF" stroke-width="5"/>
    <line x1="40" y1="55" x2="70" y2="55" stroke="#FFF" stroke-width="5"/>
  </g>
  
  <!-- Nome -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#FFF">ANOTAÍ</text>
  
  <!-- Cards flutuantes -->
  <rect x="196" y="182" width="120" height="26" fill="#FFC107" rx="13" opacity="0.95"/>
  <text x="256" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#2E7D32" font-weight="bold">✨ IDEIA</text>
  
  <rect x="196" y="222" width="120" height="26" fill="#FFB74D" rx="13" opacity="0.95"/>
  <text x="256" y="240" text-anchor="middle" font-family="Arial" font-size="11" fill="#2E7D32" font-weight="bold">💡 SUGESTÃO</text>
  
  <rect x="196" y="262" width="120" height="26" fill="#FFA726" rx="13" opacity="0.95"/>
  <text x="256" y="280" text-anchor="middle" font-family="Arial" font-size="11" fill="#2E7D32" font-weight="bold">📝 ANOTAR</text>
  
</svg>