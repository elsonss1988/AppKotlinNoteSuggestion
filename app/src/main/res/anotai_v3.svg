<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo circular -->
  <circle cx="256" cy="256" r="240" fill="#FF9800" stroke="#E65100" stroke-width="12"/>
  
  <!-- Lápis estilizado -->
  <rect x="180" y="280" width="180" height="35" fill="#FFD54F" rx="8" transform="rotate(-15 270 297)"/>
  <polygon points="350,270 380,300 360,320 330,290" fill="#FFB74D"/>
  <polygon points="160,310 190,340 210,320 180,290" fill="#FFB74D"/>
  <rect x="310" y="260" width="40" height="12" fill="#FFC107" transform="rotate(-15 330 266)"/>
  
  <!-- Ideia (lâmpada) que está sendo escrita -->
  <circle cx="130" cy="180" r="45" fill="#FFEB3B" stroke="#F9A825" stroke-width="4"/>
  <rect x="115" cy="225" width="30" height="50" fill="#FFEB3B" stroke="#F9A825" stroke-width="4"/>
  <line x1="130" y1="165" x2="130" y2="145" stroke="#F9A825" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="185" x2="80" y2="185" stroke="#F9A825" stroke-width="5" stroke-linecap="round"/>
  <line x1="160" y1="185" x2="180" y2="185" stroke="#F9A825" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Traços de escrita -->
  <path d="M190,280 L250,240 L280,210" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>